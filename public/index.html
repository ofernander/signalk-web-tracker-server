<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SignalK-Web-Tracker</title>

  <!-- MapLibre GL JS from CDN. WebGL renderer for vector tiles. -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="map" aria-label="Map showing the vessel's route"></div>

  <!-- Small floating GitHub link back to the project (plugin) repo,
       bottom-center of the map. Logo only; the aria-label names it. -->
  <a class="repo-tab" href="https://github.com/ofernander/signalk-web-tracker"
     target="_blank" rel="noopener noreferrer" aria-label="View the project on GitHub">
    <svg viewBox="0 0 16 16" width="18" height="18" aria-hidden="true" focusable="false">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/>
    </svg>
  </a>

  <aside id="panel" aria-live="polite">
    <!-- Tap target for the mobile collapse. Hidden on desktop, where the panel
         is never collapsed. -->
    <button type="button" class="panel-handle" id="panel-handle"
            aria-expanded="true" aria-controls="panel-body">
      <span class="panel-handle-grip"></span>
      <span class="sr-only">Toggle panel details</span>
    </button>

    <!-- Browser -> server fetch failure. NOT a boat problem: the boat pushes to
         the server on its own schedule and isn't in this path at all. Fires on
         two consecutive failed polls, clears on the next success. -->
    <div class="server-error" id="server-error" role="alert" hidden>
      Tracking server offline
    </div>

    <div class="panel-head">
      <h1 id="vessel-name">SignalK-Web-Tracker</h1>
      <div class="vessel-miles" id="vessel-miles" hidden></div>
    </div>

    <div class="readout">
      <!-- The age is a fact, not a heading — it sits in the label but drops the
           uppercase treatment so the two read as label + data. -->
      <div class="readout-label">Last known position<span class="readout-age" id="fix-age"></span></div>
      <div class="readout-coords" id="coords">Waiting for position…</div>
      <div class="readout-time" id="fix-time"></div>
    </div>

    <!-- Everything below the position collapses on mobile. -->
    <div class="panel-body" id="panel-body">
      <div class="env" id="env"></div>

      <!-- Date range. Hidden until a track loads; the inputs are clamped to the
           track's real span so an empty selection isn't reachable. -->
      <div class="range" id="range" hidden>
        <div class="range-label">Date range</div>
        <div class="range-inputs">
          <input type="date" id="range-from" aria-label="From date" />
          <span class="range-sep">→</span>
          <input type="date" id="range-to" aria-label="To date" />
          <!-- Export sits on the range row: you narrow a range, you export what
               it shows. Icon-only — it's a rare action and a full-width bar gave
               it more weight than it earns. -->
          <button type="button" class="export-icon" id="export-btn"
                  aria-label="Export track" title="Export track" hidden>
            <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true" focusable="false">
              <path d="M8 1v9M4.5 6.5L8 10l3.5-3.5M2 13h12"
                    fill="none" stroke="currentColor" stroke-width="1.6"
                    stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
        <button type="button" class="range-reset" id="range-reset" hidden>Show whole track</button>
      </div>
    </div>
  </aside>

  <!-- Format picker. Hidden until Export is clicked. -->
  <div class="modal" id="export-modal" hidden>
    <div class="modal-backdrop" id="export-backdrop"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="export-modal-title">
      <h2 class="modal-title" id="export-modal-title">Export track</h2>
      <p class="modal-sub" id="export-modal-sub"></p>
      <div class="modal-formats">
        <button type="button" class="fmt" data-fmt="gpx">
          <span class="fmt-name">GPX</span>
          <span class="fmt-note">Chart plotters — OpenCPN, Garmin, Navionics. Position and time only.</span>
        </button>
        <button type="button" class="fmt" data-fmt="csv">
          <span class="fmt-name">CSV</span>
          <span class="fmt-note">Spreadsheets. Includes every recorded reading.</span>
        </button>
        <button type="button" class="fmt" data-fmt="geojson">
          <span class="fmt-name">GeoJSON</span>
          <span class="fmt-note">Mapping tools. Includes every recorded reading.</span>
        </button>
        <button type="button" class="fmt" data-fmt="kml">
          <span class="fmt-name">KML</span>
          <span class="fmt-note">Google Earth.</span>
        </button>
      </div>
      <button type="button" class="modal-cancel" id="export-cancel">Cancel</button>
    </div>
  </div>

  <!-- Log reader. A log entry can carry a lot of prose and photos, far more
       than an inline map popup can hold without growing off-screen. Clicking a
       log dot opens this centered, scrollable modal instead. Hidden until then;
       the card body is filled by JS from the clicked log. -->
  <div class="modal log-modal" id="log-modal" hidden>
    <div class="modal-backdrop" id="log-backdrop"></div>
    <div class="modal-card log-modal-card" role="dialog" aria-modal="true" aria-label="Log entry">
      <button type="button" class="log-modal-close" id="log-close" aria-label="Close">&times;</button>
      <div class="log-modal-body" id="log-modal-body"></div>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>
